<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="wpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- WordPress.org requires transparent background, no border radius on icon -->
  <rect x="20" y="20" width="216" height="216" rx="48" fill="url(#wpGrad)"/>

  <!-- Pixel grid icon -->
  <g fill="#FFFFFF">
    <rect x="68" y="68" width="28" height="28" rx="4"/>
    <rect x="104" y="68" width="28" height="28" rx="4"/>
    <rect x="140" y="68" width="28" height="28" rx="4"/>
    <rect x="68" y="104" width="28" height="28" rx="4" opacity="0.7"/>
    <rect x="104" y="104" width="28" height="28" rx="4" opacity="0.5"/>
    <rect x="140" y="104" width="28" height="28" rx="4" opacity="0.7"/>
    <rect x="68" y="140" width="28" height="28" rx="4" opacity="0.7"/>
    <rect x="104" y="140" width="28" height="28" rx="4" opacity="0.5"/>
    <rect x="140" y="140" width="28" height="28" rx="4" opacity="0.7"/>
    <rect x="68" y="176" width="28" height="28" rx="4"/>
    <rect x="104" y="176" width="28" height="28" rx="4"/>
    <rect x="140" y="176" width="28" height="28" rx="4"/>
  </g>

  <!-- Speed swoosh -->
  <path d="M 180 76 Q 220 128 180 180" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M 200 96 Q 228 128 200 160" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>