<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerGrad)"/>
  <rect width="1544" height="500" fill="url(#gridPattern)"/>

  <!-- Left side: logo mark -->
  <g transform="translate(160, 130) scale(0.6)">
    <rect x="0" y="0" width="200" height="200" rx="32" fill="#FFFFFF" opacity="0.15"/>
    <rect x="20" y="20" width="160" height="160" rx="24" fill="#FFFFFF" opacity="0.9"/>
    <g fill="#22C55E">
      <rect x="36" y="36" width="28" height="28" rx="4"/>
      <rect x="72" y="36" width="28" height="28" rx="4"/>
      <rect x="108" y="36" width="28" height="28" rx="4"/>
      <rect x="36" y="72" width="28" height="28" rx="4" opacity="0.7"/>
      <rect x="72" y="72" width="28" height="28" rx="4" opacity="0.5"/>
      <rect x="108" y="72" width="28" height="28" rx="4" opacity="0.7"/>
      <rect x="36" y="108" width="28" height="28" rx="4" opacity="0.7"/>
      <rect x="72" y="108" width="28" height="28" rx="4" opacity="0.5"/>
      <rect x="108" y="108" width="28" height="28" rx="4" opacity="0.7"/>
      <rect x="36" y="144" width="28" height="28" rx="4"/>
      <rect x="72" y="144" width="28" height="28" rx="4"/>
      <rect x="108" y="144" width="28" height="28" rx="4"/>
    </g>
  </g>

  <!-- Text -->
  <text x="360" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">Vacuum Image Optimizer</text>
  <text x="360" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="400" fill="#FFFFFF" opacity="0.9">Lightning-fast image compression for WordPress</text>

  <!-- Decorative speed lines -->
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.3">
    <line x1="1200" y1="120" x2="1300" y2="120"/>
    <line x1="1250" y1="160" x2="1400" y2="160"/>
    <line x1="1150" y1="200" x2="1280" y2="200"/>
    <line x1="1220" y1="280" x2="1380" y2="280"/>
    <line x1="1180" y1="320" x2="1320" y2="320"/>
    <line x1="1280" y1="360" x2="1420" y2="360"/>
  </g>
</svg>